<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品抽選ツール</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f7fa}
button{margin:4px;padding:6px 10px;border-radius:6px;cursor:pointer}
.main{padding:12px 24px;background:#6366f1;color:#fff;border:none}
.selected{border:2px solid blue;background:#eef}
.lucky{background:gold;font-weight:bold}
</style>
</head>

<body>
<h1>商品抽選ツール</h1>

<div>現在選択: <span id="current"></span></div>
<div id="members"></div>

<button class="main" onclick="draw()">抽選する</button>
<button onclick="resetAll()">リセット</button>

<h3>最新結果</h3>
<div id="latest"></div>

<h3>結果一覧</h3>
<div id="results"></div>

<script>
const members=[
"大塚さん","玲さん","外間さん","堀江さん","澤岻さん",
"吉味さん","知念さん","樹里さん","糸数さん","羽地さん",
"育美さん","睦さん","立島さん"
];

const prizes=[
"ひざつきの割れせんべい",
"日清焼きそばUFOプチ",
"森永　塩キャラメル",
"茶葉を味わうアイスティー",
"マクドナルド株主優待券",
"クリームサンドクラッカー",
"焼きドーナツ　プレーン＆ココア",
"ロッテ　小梅",
"エースコック　よこすか海軍カレーラーメン",
"◎ちゃん麺づくり　合わせ味噌",
"くだものたのしい　うめ果汁仕立て（ゼリー）",
"QUOカード　５００円",
"いつものプチお菓子"
];

let assigned={};
let selected=members[0];

function render(){
const memberDiv=document.getElementById("members");
memberDiv.innerHTML="";

members.filter(m=>!assigned[m]).forEach(name=>{
const btn=document.createElement("button");
btn.textContent=name;
if(name===selected)btn.classList.add("selected");
btn.onclick=()=>{selected=name;render();};
memberDiv.appendChild(btn);
});

document.getElementById("current").textContent=selected||"なし";

const results=document.getElementById("results");
results.innerHTML="";
Object.entries(assigned).forEach(([name,prize])=>{
const div=document.createElement("div");
if(prize.includes("マクドナルド"))div.classList.add("lucky");
div.textContent=name+" → "+prize;
results.appendChild(div);
});
}

function draw(){
const remainingPrizes=prizes.filter(p=>!Object.values(assigned).includes(p));
if(!selected||remainingPrizes.length===0)return;

const prize=remainingPrizes[Math.floor(Math.random()*remainingPrizes.length)];
assigned[selected]=prize;

let comment="当選！";
if(prize.includes("マクドナルド")) comment="ラッキー賞！！";

const prev=selected;
selected=members.filter(m=>!assigned[m])[0]||"";

document.getElementById("latest").textContent=prev+" → "+prize+" / "+comment;
render();
}

function resetAll(){
assigned={};
selected=members[0];
document.getElementById("latest").textContent="";
render();
}

render();
</script>

</body>
</html>
``
