
<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>抽選ツール</title>
</head>
<body>

<h2>抽選ツール</h2>

<div id="members"></div>
<button onclick="draw()">抽選</button>

<h3>結果</h3>
<div id="result"></div>

<script>

const members=[
"大塚さん","玲さん","外間さん","堀江さん","澤岻さん",
"吉味さん","知念さん","樹里さん","糸数さん","羽地さん",
"育美さん","睦さん","立島さん"
];

const prizes=[
"ひざつきの割れせんべい",
"日清焼きそばUFOプチ",
"森永 塩キャラメル",
"茶葉を味わうアイスティー",
"マクドナルド株主優待券",
"クリームサンドクラッカー",
"焼きドーナツ プレーン＆ココア",
"ロッテ 小梅",
"エースコック よこすか海軍カレーラーメン",
"◎ちゃん麺づくり 合わせ味噌",
"くだものたのしい うめ果汁仕立て",
"QUOカード 500円",
"いつものプチお菓子"
];

let assigned={};
let selected=null;

function render(){
const div=document.getElementById("members");
div.innerHTML="";

members.filter(m=>!assigned[m]).forEach(name=>{
const btn=document.createElement("button");
btn.textContent=name;
btn.onclick=()=>{selected=name};
div.appendChild(btn);
});
}

function draw(){
if(!selected){alert("名前を選んでください");return;}
const remain=prizes.filter(p=>!Object.values(assigned).includes(p));
if(remain.length===0)return;

const prize=remain[Math.floor(Math.random()*remain.length)];
assigned[selected]=prize;

document.getElementById("result").innerHTML+=selected+" → "+prize+"<br>";

selected=null;
render();
}

render();

</script>

</body>
</html>
